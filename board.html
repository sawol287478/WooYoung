<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>노우영</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; text-decoration: none; }

        body {
            font-family: 'Apple SD Gothic Neo', 'Pretendard', sans-serif;
            line-height: 1.6; color: #333; background-color: #f9f9fb;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        body.dark { color: #e5e5e7; background-color: #121212; }
        body.dark header { background: rgba(24,24,28,0.92); border-bottom-color: #2c2c2e; }
        body.dark .logo { color: #e5e5e7; }
        body.dark .page-title { background: linear-gradient(135deg, #1c1c1e 0%, #2c2c2e 100%); }
        body.dark .page-title p { color: #aaa; }
        body.dark .post-card { background: #1e1e1e; box-shadow: 0 2px 12px rgba(0,0,0,0.3); }
        body.dark .post-title { color: #e5e5e7; }
        body.dark .post-preview { color: #999; }
        body.dark .modal { background: #1e1e1e; color: #e5e5e7; }
        body.dark .modal-title { color: #e5e5e7; }
        body.dark .form-group label { color: #bbb; }
        body.dark .form-group input, body.dark .form-group textarea { background: #2a2a2a; border-color: #3a3a3a; color: #e5e5e7; }
        body.dark .form-group input:focus, body.dark .form-group textarea:focus { background: #333; border-color: #007AFF; }
        body.dark .btn-cancel { background: #2a2a2a; border-color: #3a3a3a; color: #aaa; }
        body.dark .btn-cancel:hover { background: #333; }
        body.dark .btn-close { background: #2a2a2a; border-color: #3a3a3a; color: #aaa; }
        body.dark .btn-close:hover { background: #333; }
        body.dark .btn-edit { background: transparent; }
        body.dark .btn-delete { background: transparent; }
        body.dark .post-detail-meta { color: #888; }
        body.dark .post-detail-body { color: #ccc; }
        body.dark .post-detail-meta, body.dark .post-detail-actions, body.dark .comments-section { border-color: #2c2c2e; }
        body.dark .comment-item { background: #2a2a2a; }
        body.dark .comment-author { color: #e5e5e7; }
        body.dark .comment-text { color: #bbb; }
        body.dark .comment-form input { background: #2a2a2a; border-color: #3a3a3a; color: #e5e5e7; }
        body.dark .comment-form input:focus { background: #333; border-color: #007AFF; }
        body.dark .comment-form button { background: #e5e5e7; color: #111; }
        body.dark footer { color: #555; border-top-color: #2c2c2e; }
        body.dark .empty-state { color: #555; }
        body.dark .btn-google { background: #2a2a2a; border-color: #3a3a3a; color: #e5e5e7; }
        body.dark .btn-google:hover { background: #333; }
        body.dark .auth-divider { color: #555; }
        body.dark .auth-divider::before, body.dark .auth-divider::after { background: #3a3a3a; }
        body.dark .auth-tab { background: #2a2a2a; border-color: #3a3a3a; color: #888; }
        body.dark .auth-tab.active { background: #007AFF; color: white; border-color: #007AFF; }
        body.dark .btn-login-header { border-color: #5aadff; color: #5aadff; }
        body.dark .btn-login-header:hover { background: #5aadff; color: #111; }
        body.dark .btn-logout-header { border-color: #444; color: #aaa; }
        body.dark .btn-logout-header:hover { background: #2a2a2a; }
        body.dark .dark-toggle { border-color: #444; background: #1c1c1e; }

        header {
            background: rgba(255,255,255,0.9); backdrop-filter: blur(10px);
            position: fixed; width: 100%; top: 0; z-index: 100;
            border-bottom: 1px solid #eee; transition: background 0.3s ease, border-color 0.3s ease;
        }

        .header-container {
            max-width: 1000px; margin: 0 auto;
            display: flex; align-items: center; padding: 1rem 2rem; gap: 0.8rem;
        }

        .logo { font-size: 1.2rem; font-weight: 800; letter-spacing: -1px; color: #333; transition: color 0.3s ease; }

        .nav-board {
            margin-left: auto; background: #007AFF; color: white;
            padding: 8px 18px; border-radius: 10px; font-size: 0.85rem;
            font-weight: 600; transition: all 0.2s ease;
        }
        .nav-board:hover { background: #005ecb; transform: translateY(-2px); }

        .dark-toggle {
            background: none; border: 1.5px solid #ddd; border-radius: 10px;
            padding: 7px 13px; font-size: 1rem; cursor: pointer;
            transition: all 0.2s ease; line-height: 1;
        }
        .dark-toggle:hover { border-color: #007AFF; transform: translateY(-2px); }

        .btn-login-header {
            padding: 7px 16px; border-radius: 10px; font-size: 0.85rem;
            font-weight: 600; cursor: pointer; border: 1.5px solid #007AFF;
            color: #007AFF; background: transparent; transition: all 0.2s;
        }
        .btn-login-header:hover { background: #007AFF; color: white; }

        .btn-logout-header {
            padding: 7px 16px; border-radius: 10px; font-size: 0.85rem;
            font-weight: 600; cursor: pointer; border: 1.5px solid #ddd;
            color: #666; background: transparent; transition: all 0.2s;
        }
        .btn-logout-header:hover { background: #f5f5f5; }

        .header-user-avatar {
            width: 30px; height: 30px; border-radius: 50%;
            object-fit: cover; border: 2px solid #007AFF;
        }

        main { padding-top: 80px; }

        .page-title {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            padding: 5rem 2rem 4rem; text-align: center;
            animation: fadeIn 0.8s ease-out; transition: background 0.3s ease;
        }

        .badge { background: #007AFF; color: white; padding: 5px 15px; border-radius: 20px; font-size: 0.8rem; font-weight: bold; display: inline-block; margin-bottom: 1rem; }
        .page-title h1 { font-size: 2.8rem; font-weight: 800; letter-spacing: -1px; line-height: 1.2; }
        .page-title h1 strong { color: #007AFF; }
        .page-title p { margin-top: 0.8rem; font-size: 1.1rem; color: #666; transition: color 0.3s ease; }

        .board-container { max-width: 800px; margin: 0 auto; padding: 3rem 2rem 6rem; animation: fadeIn 0.9s ease-out; }
        .board-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; }
        .section-label { font-size: 0.75rem; font-weight: 700; color: #007AFF; letter-spacing: 2px; text-transform: uppercase; }

        .btn-write {
            background: #007AFF; color: white; border: none;
            padding: 10px 22px; border-radius: 10px; font-size: 0.9rem;
            font-weight: 600; cursor: pointer; transition: all 0.2s ease;
        }
        .btn-write:hover { background: #005ecb; transform: translateY(-2px); box-shadow: 0 4px 14px rgba(0,122,255,0.3); }

        .post-list { display: flex; flex-direction: column; gap: 1rem; }

        .post-card {
            background: white; border-radius: 16px; padding: 1.4rem 1.6rem;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06); cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.3s ease;
        }
        .post-card:hover { transform: translateY(-3px); box-shadow: 0 8px 24px rgba(0,0,0,0.1); }
        .post-card-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 1rem; }
        .post-title { font-size: 1rem; font-weight: 700; color: #222; flex: 1; transition: color 0.3s ease; }
        .post-meta { font-size: 0.78rem; color: #aaa; white-space: nowrap; margin-top: 2px; }
        .post-preview { margin-top: 0.5rem; font-size: 0.88rem; color: #777; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
        .post-footer { margin-top: 0.8rem; display: flex; align-items: center; gap: 0.8rem; }
        .comment-count { font-size: 0.78rem; color: #007AFF; font-weight: 600; }

        .empty-state { text-align: center; padding: 4rem 2rem; color: #bbb; font-size: 1rem; }
        .empty-state span { font-size: 2.5rem; display: block; margin-bottom: 0.8rem; }

        .modal-overlay {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,0.4); z-index: 200;
            justify-content: center; align-items: center; padding: 1.5rem;
        }
        .modal-overlay.open { display: flex; animation: fadeIn 0.2s ease; }

        .modal {
            background: white; border-radius: 20px; width: 100%;
            max-width: 600px; max-height: 85vh; overflow-y: auto;
            padding: 2rem; box-shadow: 0 20px 60px rgba(0,0,0,0.2);
            transition: background 0.3s ease;
        }

        .modal-title { font-size: 1.3rem; font-weight: 800; margin-bottom: 1.4rem; letter-spacing: -0.5px; }
        .form-group { margin-bottom: 1rem; }
        .form-group label { display: block; font-size: 0.8rem; font-weight: 700; color: #555; margin-bottom: 0.4rem; letter-spacing: 0.5px; }
        .form-group input, .form-group textarea { width: 100%; padding: 12px 14px; border: 1.5px solid #e5e5e5; border-radius: 10px; font-size: 0.95rem; font-family: inherit; color: #333; background: #fafafa; transition: border-color 0.2s, background 0.3s ease; resize: vertical; }
        .form-group input:focus, .form-group textarea:focus { outline: none; border-color: #007AFF; background: white; }
        .form-group textarea { min-height: 120px; }

        .modal-actions { display: flex; justify-content: flex-end; gap: 0.6rem; margin-top: 1.4rem; }

        .btn-cancel { padding: 10px 22px; border: 1.5px solid #e0e0e0; background: white; border-radius: 10px; font-size: 0.9rem; font-weight: 600; color: #666; cursor: pointer; transition: all 0.2s; }
        .btn-cancel:hover { background: #f5f5f5; }
        .btn-submit { padding: 10px 22px; background: #007AFF; color: white; border: none; border-radius: 10px; font-size: 0.9rem; font-weight: 600; cursor: pointer; transition: all 0.2s; }
        .btn-submit:hover { background: #005ecb; }
        .btn-submit:disabled { background: #aaa; cursor: not-allowed; }

        .post-detail-title { font-size: 1.4rem; font-weight: 800; letter-spacing: -0.5px; line-height: 1.3; margin-bottom: 0.5rem; }
        .post-detail-meta { font-size: 0.82rem; color: #aaa; margin-bottom: 1.4rem; padding-bottom: 1.2rem; border-bottom: 1px solid #f0f0f0; }
        .post-detail-body { font-size: 0.97rem; color: #444; line-height: 1.8; white-space: pre-wrap; word-break: break-word; }
        .post-detail-actions { display: flex; gap: 0.5rem; margin-top: 1.4rem; padding-top: 1.2rem; border-top: 1px solid #f0f0f0; }

        .btn-edit { padding: 8px 18px; border: 1.5px solid #007AFF; background: white; color: #007AFF; border-radius: 8px; font-size: 0.85rem; font-weight: 600; cursor: pointer; transition: all 0.2s; }
        .btn-edit:hover { background: #007AFF; color: white; }
        .btn-delete { padding: 8px 18px; border: 1.5px solid #ff3b30; background: white; color: #ff3b30; border-radius: 8px; font-size: 0.85rem; font-weight: 600; cursor: pointer; transition: all 0.2s; }
        .btn-delete:hover { background: #ff3b30; color: white; }
        .btn-close { margin-left: auto; padding: 8px 18px; border: 1.5px solid #e0e0e0; background: white; color: #666; border-radius: 8px; font-size: 0.85rem; font-weight: 600; cursor: pointer; transition: all 0.2s; }
        .btn-close:hover { background: #f5f5f5; }

        .comments-section { margin-top: 1.6rem; padding-top: 1.4rem; border-top: 1px solid #f0f0f0; }
        .comments-label { font-size: 0.8rem; font-weight: 700; color: #007AFF; letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 1rem; }
        .comment-item { background: #f9f9fb; border-radius: 12px; padding: 1rem 1.2rem; margin-bottom: 0.7rem; position: relative; }
        .comment-author { font-size: 0.82rem; font-weight: 700; color: #333; }
        .comment-date { font-size: 0.75rem; color: #bbb; margin-left: 0.5rem; }
        .comment-text { margin-top: 0.3rem; font-size: 0.9rem; color: #555; white-space: pre-wrap; word-break: break-word; }
        .comment-delete-btn { position: absolute; top: 0.8rem; right: 1rem; background: none; border: none; color: #ccc; font-size: 0.8rem; cursor: pointer; }
        .comment-delete-btn:hover { color: #ff3b30; }

        .comment-form { display: flex; gap: 0.6rem; margin-top: 0.8rem; }
        .comment-form input { flex: 1; padding: 10px 14px; border: 1.5px solid #e5e5e5; border-radius: 10px; font-size: 0.9rem; font-family: inherit; background: #fafafa; }
        .comment-form input:focus { outline: none; border-color: #007AFF; background: white; }
        .comment-form button { padding: 10px 18px; background: #333; color: white; border: none; border-radius: 10px; font-size: 0.85rem; font-weight: 600; cursor: pointer; white-space: nowrap; }
        .comment-form button:hover { background: #000; }
        .comment-login-notice { font-size: 0.85rem; color: #aaa; margin-top: 0.6rem; }
        .comment-login-notice span { color: #007AFF; cursor: pointer; font-weight: 600; }

        /* 로그인 모달 */
        .auth-modal { max-width: 400px; }

        .btn-google {
            width: 100%; padding: 12px; border: 1.5px solid #e0e0e0;
            border-radius: 10px; background: white; font-size: 0.95rem;
            font-weight: 600; cursor: pointer; display: flex; align-items: center;
            justify-content: center; gap: 10px; transition: all 0.2s; color: #333; margin-bottom: 0.8rem;
        }
        .btn-google:hover { background: #f5f5f5; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }

        .auth-divider { display: flex; align-items: center; gap: 0.8rem; font-size: 0.8rem; color: #aaa; margin: 1rem 0; }
        .auth-divider::before, .auth-divider::after { content: ''; flex: 1; height: 1px; background: #e5e5e5; }

        .auth-tabs { display: flex; gap: 0.5rem; margin-bottom: 1.2rem; }
        .auth-tab { flex: 1; padding: 9px; border: 1.5px solid #e0e0e0; border-radius: 10px; background: white; font-size: 0.88rem; font-weight: 600; cursor: pointer; color: #888; transition: all 0.2s; }
        .auth-tab.active { background: #007AFF; color: white; border-color: #007AFF; }

        .auth-form-section { display: none; }
        .auth-form-section.active { display: block; }

        .auth-error { color: #ff3b30; font-size: 0.82rem; margin-top: 0.4rem; min-height: 1.2em; }

        footer { text-align: center; padding: 2rem; font-size: 0.85rem; color: #aaa; border-top: 1px solid #eee; }

        #toast { position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%) translateY(20px); background: #333; color: white; padding: 10px 22px; border-radius: 20px; font-size: 0.88rem; font-weight: 600; opacity: 0; transition: opacity 0.3s, transform 0.3s; z-index: 9999; pointer-events: none; }
        #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<header>
    <div class="header-container">
        <a href="./index.html"><h1 class="logo">WOOYOUNG</h1></a>
        <button class="dark-toggle" id="darkToggle" onclick="toggleDark()">🌙</button>
        <div id="headerAuthArea"></div>
        <a href="./board.html" class="nav-board">게시판</a>
    </div>
</header>

<main>
    <div class="page-title">
        <span class="badge">Board</span>
        <h1>자유롭게 이야기해요,<br><strong>게시판</strong>입니다.</h1>
        <p>로그인 후 글과 댓글을 남길 수 있어요.</p>
    </div>

    <div class="board-container">
        <div class="board-header">
            <span class="section-label">Posts</span>
            <button class="btn-write" onclick="onWriteClick()">✏️ 글쓰기</button>
        </div>
        <div class="post-list" id="postList">
            <div class="empty-state"><span>⏳</span>불러오는 중...</div>
        </div>
    </div>
</main>

<footer><p>© 2026 Noh Wooyoung. Designed with Passion.</p></footer>

<!-- 로그인 모달 -->
<div class="modal-overlay" id="authModal">
    <div class="modal auth-modal">
        <div class="modal-title">로그인 / 회원가입</div>
        <button class="btn-google" onclick="signInWithGoogle()">
            <svg width="18" height="18" viewBox="0 0 18 18"><path fill="#4285F4" d="M16.51 8H8.98v3h4.3c-.18 1-.74 1.48-1.6 2.04v2.01h2.6a7.8 7.8 0 0 0 2.38-5.88c0-.57-.05-.66-.15-1.17z"/><path fill="#34A853" d="M8.98 17c2.16 0 3.97-.72 5.3-1.94l-2.6-2.04a4.8 4.8 0 0 1-7.18-2.54H1.83v2.07A8 8 0 0 0 8.98 17z"/><path fill="#FBBC05" d="M4.5 10.48A4.8 4.8 0 0 1 4.5 7.52V5.45H1.83a8 8 0 0 0 0 7.1l2.67-2.07z"/><path fill="#EA4335" d="M8.98 3.58c1.32 0 2.5.45 3.44 1.35l2.54-2.54A8 8 0 0 0 1.83 5.45L4.5 7.52A4.77 4.77 0 0 1 8.98 3.58z"/></svg>
            Google로 계속하기
        </button>
        <div class="auth-divider">또는 이메일로</div>
        <div class="auth-tabs">
            <button class="auth-tab active" id="tabLogin" onclick="switchAuthTab('login')">로그인</button>
            <button class="auth-tab" id="tabSignup" onclick="switchAuthTab('signup')">회원가입</button>
        </div>
        <!-- 로그인 폼 -->
        <div class="auth-form-section active" id="formLogin">
            <div class="form-group"><label>이메일</label><input type="email" id="loginEmail" placeholder="email@example.com"></div>
            <div class="form-group"><label>비밀번호</label><input type="password" id="loginPassword" placeholder="비밀번호 입력"></div>
            <div class="auth-error" id="loginError"></div>
            <div class="modal-actions">
                <button class="btn-cancel" onclick="closeAuthModal()">취소</button>
                <button class="btn-submit" onclick="signInWithEmail()">로그인</button>
            </div>
        </div>
        <!-- 회원가입 폼 -->
        <div class="auth-form-section" id="formSignup">
            <div class="form-group"><label>이름 (닉네임)</label><input type="text" id="signupName" placeholder="게시판에 표시될 이름"></div>
            <div class="form-group"><label>이메일</label><input type="email" id="signupEmail" placeholder="email@example.com"></div>
            <div class="form-group"><label>비밀번호 (6자 이상, 특수문자 포함)</label><input type="password" id="signupPassword" placeholder="특수문자 포함 6자 이상"></div>
            <div class="auth-error" id="signupError"></div>
            <div class="modal-actions">
                <button class="btn-cancel" onclick="closeAuthModal()">취소</button>
                <button class="btn-submit" onclick="signUpWithEmail()">회원가입</button>
            </div>
        </div>
    </div>
</div>

<!-- 글쓰기/수정 모달 -->
<div class="modal-overlay" id="writeModal">
    <div class="modal">
        <div class="modal-title" id="writeModalTitle">새 글 작성</div>
        <div class="form-group"><label>제목</label><input type="text" id="inputTitle" placeholder="제목을 입력하세요"></div>
        <div class="form-group"><label>내용</label><textarea id="inputBody" placeholder="내용을 입력하세요"></textarea></div>
        <div class="modal-actions">
            <button class="btn-cancel" onclick="closeWriteModal()">취소</button>
            <button class="btn-submit" id="submitBtn" onclick="submitPost()">등록</button>
        </div>
    </div>
</div>

<!-- 게시글 상세 모달 -->
<div class="modal-overlay" id="detailModal">
    <div class="modal">
        <div class="post-detail-title" id="detailTitle"></div>
        <div class="post-detail-meta" id="detailMeta"></div>
        <div class="post-detail-body" id="detailBody"></div>
        <div class="comments-section">
            <div class="comments-label">댓글</div>
            <div id="commentList"></div>
            <div class="comment-form" id="commentFormArea">
                <input type="text" id="commentTextInput" placeholder="댓글을 입력하세요">
                <button onclick="submitComment()">등록</button>
            </div>
            <div class="comment-login-notice" id="commentLoginNotice" style="display:none;">
                💬 댓글을 남기려면 <span onclick="closeDetailModal(); openAuthModal()">로그인</span>이 필요해요.
            </div>
        </div>
        <div class="post-detail-actions">
            <button class="btn-edit" id="btnEdit" style="display:none" onclick="openEditModal()">수정</button>
            <button class="btn-delete" id="btnDeletePost" style="display:none" onclick="deleteCurrentPost()">삭제</button>
            <button class="btn-close" onclick="closeDetailModal()">닫기</button>
        </div>
    </div>
</div>

<!-- 확인 모달 -->
<div class="modal-overlay" id="confirmModal">
    <div class="modal" style="max-width:360px; text-align:center; padding:2.2rem 2rem;">
        <div style="font-size:2rem; margin-bottom:0.8rem;">🗑️</div>
        <div style="font-size:1.05rem; font-weight:700; margin-bottom:0.5rem;" id="confirmMessage">정말 삭제하시겠어요?</div>
        <div style="font-size:0.85rem; color:#aaa; margin-bottom:1.6rem;">삭제하면 되돌릴 수 없어요.</div>
        <div style="display:flex; gap:0.6rem; justify-content:center;">
            <button class="btn-cancel" onclick="resolveConfirm(false)" style="flex:1;">취소</button>
            <button class="btn-delete" onclick="resolveConfirm(true)" style="flex:1;">삭제</button>
        </div>
    </div>
</div>

<div id="toast"></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-app.js";
    import {
        getAuth, onAuthStateChanged, signOut,
        GoogleAuthProvider, signInWithPopup,
        createUserWithEmailAndPassword, signInWithEmailAndPassword,
        updateProfile
    } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-auth.js";
    import {
        getFirestore, collection, addDoc, getDocs, getDoc,
        doc, updateDoc, deleteDoc, orderBy, query, serverTimestamp
    } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDCr7IbF5T6qWEa0ne-E93oxXtluwvGkOY",
        authDomain: "wooyoung-board.firebaseapp.com",
        projectId: "wooyoung-board",
        storageBucket: "wooyoung-board.firebasestorage.app",
        messagingSenderId: "643705634708",
        appId: "1:643705634700:web:8cd0102769aee7b47d20a9",
        measurementId: "G-5W7TZP3J08"
    };

    const app  = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db   = getFirestore(app);

    const DARK_KEY = 'wooyoung_dark_mode';
    let currentUser   = null;
    let currentPostId = null;
    let editMode      = false;

    // ── 다크모드 ──────────────────────────────────
    function applyDark(dark) {
        document.body.classList.toggle('dark', dark);
        document.getElementById('darkToggle').textContent = dark ? '☀️' : '🌙';
    }
    window.toggleDark = () => {
        const isDark = document.body.classList.contains('dark');
        localStorage.setItem(DARK_KEY, !isDark);
        applyDark(!isDark);
    };
    applyDark(localStorage.getItem(DARK_KEY) === 'true');

    // ── 토스트 ────────────────────────────────────
    let _tt = null;
    function showToast(msg) {
        const t = document.getElementById('toast');
        t.textContent = msg; t.classList.add('show');
        clearTimeout(_tt);
        _tt = setTimeout(() => t.classList.remove('show'), 2500);
    }

    // ── 확인 모달 ─────────────────────────────────
    let _cr = null;
    window.customConfirm = (msg) => {
        document.getElementById('confirmMessage').textContent = msg || '정말 삭제하시겠어요?';
        document.getElementById('confirmModal').classList.add('open');
        return new Promise(r => { _cr = r; });
    };
    window.resolveConfirm = (v) => {
        document.getElementById('confirmModal').classList.remove('open');
        if (_cr) { _cr(v); _cr = null; }
    };

    // ── 날짜 ──────────────────────────────────────
    function fmt(ts) {
        if (!ts) return '';
        const d = ts.toDate ? ts.toDate() : new Date(ts);
        return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
    }

    function esc(s) {
        return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function userName(user) {
        return user.displayName || user.email.split('@')[0];
    }

    // ══════════════════════════════════════════════
    //  Auth
    // ══════════════════════════════════════════════
    onAuthStateChanged(auth, user => {
        currentUser = user;
        renderHeaderAuth(user);
        renderList();
    });

    function renderHeaderAuth(user) {
        const area = document.getElementById('headerAuthArea');
        if (user) {
            const avatar = user.photoURL
                ? `<img src="${esc(user.photoURL)}" class="header-user-avatar">`
                : `<span style="font-size:1.2rem">👤</span>`;
            area.innerHTML = `<div style="display:flex;align-items:center;gap:0.5rem;">
                ${avatar}
                <span style="font-size:0.85rem;font-weight:600;max-width:90px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${esc(userName(user))}</span>
                <button class="btn-logout-header" onclick="doSignOut()">로그아웃</button>
            </div>`;
        } else {
            area.innerHTML = `<button class="btn-login-header" onclick="openAuthModal()">로그인</button>`;
        }
    }

    window.doSignOut = async () => { await signOut(auth); showToast('👋 로그아웃됐어요.'); };

    window.openAuthModal = () => {
        document.getElementById('authModal').classList.add('open');
        switchAuthTab('login');
        document.getElementById('loginError').textContent = '';
        document.getElementById('signupError').textContent = '';
    };
    window.closeAuthModal = () => document.getElementById('authModal').classList.remove('open');

    window.switchAuthTab = (tab) => {
        ['login','signup'].forEach(t => {
            document.getElementById('tab' + t.charAt(0).toUpperCase() + t.slice(1)).classList.toggle('active', t === tab);
            document.getElementById('form' + t.charAt(0).toUpperCase() + t.slice(1)).classList.toggle('active', t === tab);
        });
    };

    function authErr(code) {
        const m = { 'auth/user-not-found':'등록되지 않은 이메일이에요.', 'auth/wrong-password':'비밀번호가 틀렸어요.', 'auth/invalid-email':'올바른 이메일 형식이 아니에요.', 'auth/email-already-in-use':'이미 사용 중인 이메일이에요.', 'auth/weak-password':'비밀번호는 6자 이상이어야 해요.', 'auth/popup-closed-by-user':'로그인 창이 닫혔어요.', 'auth/invalid-credential':'이메일 또는 비밀번호가 올바르지 않아요.' };
        return m[code] || '오류가 발생했어요. 다시 시도해주세요.';
    }

    window.signInWithGoogle = async () => {
        try {
            await signInWithPopup(auth, new GoogleAuthProvider());
            closeAuthModal(); showToast('🎉 로그인됐어요!');
        } catch(e) { document.getElementById('loginError').textContent = authErr(e.code); }
    };

    window.signInWithEmail = async () => {
        const email = document.getElementById('loginEmail').value.trim();
        const pw    = document.getElementById('loginPassword').value;
        if (!email || !pw) { document.getElementById('loginError').textContent = '이메일과 비밀번호를 입력해주세요.'; return; }
        try {
            await signInWithEmailAndPassword(auth, email, pw);
            closeAuthModal(); showToast('🎉 로그인됐어요!');
        } catch(e) { document.getElementById('loginError').textContent = authErr(e.code); }
    };

    window.signUpWithEmail = async () => {
        const name  = document.getElementById('signupName').value.trim();
        const email = document.getElementById('signupEmail').value.trim();
        const pw    = document.getElementById('signupPassword').value;
        const errEl = document.getElementById('signupError');
        if (!name)  { errEl.textContent = '이름을 입력해주세요.'; return; }
        if (!email) { errEl.textContent = '이메일을 입력해주세요.'; return; }
        if (!pw)    { errEl.textContent = '비밀번호를 입력해주세요.'; return; }
        if (pw.length < 6) { errEl.textContent = '비밀번호는 6자 이상이어야 해요.'; return; }
        if (!/[!@#$%^&*()_+\-=\[\]{};':"\\|,.<>\/?]/.test(pw)) { errEl.textContent = '비밀번호에 특수문자를 포함해주세요.'; return; }
        try {
            const cred = await createUserWithEmailAndPassword(auth, email, pw);
            await updateProfile(cred.user, { displayName: name });
            closeAuthModal(); showToast('🎉 회원가입 완료!');
        } catch(e) { errEl.textContent = authErr(e.code); }
    };

    // ══════════════════════════════════════════════
    //  게시글
    // ══════════════════════════════════════════════
    async function renderList() {
        const container = document.getElementById('postList');
        try {
            const q = query(collection(db, 'posts'), orderBy('createdAt', 'desc'));
            const snap = await getDocs(q);
            if (snap.empty) {
                container.innerHTML = `<div class="empty-state"><span>📝</span>아직 작성된 글이 없어요.<br>첫 번째 글을 남겨보세요!</div>`;
                return;
            }
            container.innerHTML = snap.docs.map(d => {
                const p = d.data();
                return `<div class="post-card" onclick="openDetail('${d.id}')">
                    <div class="post-card-top">
                        <div class="post-title">${esc(p.title)}</div>
                        <div class="post-meta">${fmt(p.createdAt)}</div>
                    </div>
                    <div class="post-preview">${esc(p.body)}</div>
                    <div class="post-footer">
                        <span class="post-meta"> ${esc(p.authorName)}</span>
                        <span class="comment-count">💬 ${p.comments ? p.comments.length : 0}</span>
                    </div>
                </div>`;
            }).join('');
        } catch(e) {
            container.innerHTML = `<div class="empty-state"><span>⚠️</span>${e.message}</div>`;
        }
    }

    window.onWriteClick = () => {
        if (!currentUser) { openAuthModal(); showToast('✏️ 글을 쓰려면 로그인이 필요해요.'); return; }
        openWriteModal();
    };

    window.openWriteModal = () => {
        editMode = false;
        document.getElementById('writeModalTitle').textContent = '새 글 작성';
        document.getElementById('inputTitle').value = '';
        document.getElementById('inputBody').value = '';
        document.getElementById('writeModal').classList.add('open');
    };
    window.closeWriteModal = () => document.getElementById('writeModal').classList.remove('open');

    window.submitPost = async () => {
        if (!currentUser) { openAuthModal(); return; }
        const title = document.getElementById('inputTitle').value.trim();
        const body  = document.getElementById('inputBody').value.trim();
        if (!title || !body) { alert('제목과 내용을 모두 입력해주세요.'); return; }
        const btn = document.getElementById('submitBtn');
        btn.disabled = true; btn.textContent = '저장 중...';
        try {
            if (editMode && currentPostId) {
                await updateDoc(doc(db, 'posts', currentPostId), { title, body });
                showToast('✅ 글이 수정됐어요!');
                closeWriteModal(); await renderList(); await openDetail(currentPostId);
            } else {
                await addDoc(collection(db, 'posts'), {
                    title, body,
                    authorName: userName(currentUser),
                    authorUid: currentUser.uid,
                    createdAt: serverTimestamp(),
                    comments: []
                });
                showToast('✅ 글이 등록됐어요!');
                closeWriteModal(); await renderList();
            }
        } catch(e) { alert('오류: ' + e.message); }
        finally { btn.disabled = false; btn.textContent = '등록'; }
    };

    window.openDetail = async (id) => {
        currentPostId = id;
        const snap = await getDoc(doc(db, 'posts', id));
        if (!snap.exists()) { alert('게시글을 찾을 수 없어요.'); return; }
        const p = snap.data();
        document.getElementById('detailTitle').textContent = p.title;
        document.getElementById('detailMeta').textContent = `✍️ ${p.authorName}  ·  ${fmt(p.createdAt)}`;
        document.getElementById('detailBody').textContent = p.body;

        const isOwner = currentUser && currentUser.uid === p.authorUid;
        document.getElementById('btnEdit').style.display      = isOwner ? '' : 'none';
        document.getElementById('btnDeletePost').style.display = isOwner ? '' : 'none';
        document.getElementById('commentFormArea').style.display    = currentUser ? 'flex' : 'none';
        document.getElementById('commentLoginNotice').style.display = currentUser ? 'none' : 'block';

        renderComments(p.comments || []);
        document.getElementById('commentTextInput').value = '';
        document.getElementById('detailModal').classList.add('open');
    };
    window.closeDetailModal = () => { document.getElementById('detailModal').classList.remove('open'); currentPostId = null; };

    window.openEditModal = async () => {
        if (!currentPostId) return;
        const snap = await getDoc(doc(db, 'posts', currentPostId));
        if (!snap.exists()) return;
        const p = snap.data();
        editMode = true;
        document.getElementById('writeModalTitle').textContent = '글 수정';
        document.getElementById('inputTitle').value = p.title;
        document.getElementById('inputBody').value  = p.body;
        document.getElementById('detailModal').classList.remove('open');
        document.getElementById('writeModal').classList.add('open');
    };

    window.deleteCurrentPost = async () => {
        const ok = await window.customConfirm('글을 삭제할까요?');
        if (!ok) return;
        await deleteDoc(doc(db, 'posts', currentPostId));
        showToast('🗑️ 글이 삭제됐어요.');
        closeDetailModal(); await renderList();
    };

    // ── 댓글 ──────────────────────────────────────
    function renderComments(comments) {
        const list = document.getElementById('commentList');
        if (!comments.length) { list.innerHTML = `<p style="font-size:0.85rem;color:#bbb;margin-bottom:0.8rem;">아직 댓글이 없어요.</p>`; return; }
        list.innerHTML = comments.map((c, idx) => {
            const mine = currentUser && currentUser.uid === c.authorUid;
            return `<div class="comment-item">
                <span class="comment-author">${esc(c.author)}</span>
                <span class="comment-date">${fmt(c.createdAt)}</span>
                <div class="comment-text">${esc(c.text)}</div>
                ${mine ? `<button class="comment-delete-btn" onclick="handleDeleteComment(${idx})">✕</button>` : ''}
            </div>`;
        }).join('');
    }

    window.submitComment = async () => {
        if (!currentUser) { openAuthModal(); return; }
        const text = document.getElementById('commentTextInput').value.trim();
        if (!text) { alert('댓글 내용을 입력해주세요.'); return; }
        const ref = doc(db, 'posts', currentPostId);
        const snap = await getDoc(ref);
        if (!snap.exists()) return;
        const comments = snap.data().comments || [];
        comments.push({ author: userName(currentUser), authorUid: currentUser.uid, text, createdAt: new Date().toISOString() });
        await updateDoc(ref, { comments });
        document.getElementById('commentTextInput').value = '';
        renderComments(comments); await renderList();
    };

    window.handleDeleteComment = async (idx) => {
        const ok = await window.customConfirm('댓글을 삭제할까요?');
        if (!ok) return;
        const ref = doc(db, 'posts', currentPostId);
        const snap = await getDoc(ref);
        if (!snap.exists()) return;
        const comments = snap.data().comments || [];
        comments.splice(idx, 1);
        await updateDoc(ref, { comments });
        renderComments(comments); await renderList();
    };

    // ── 모달 외부 클릭 닫기 ───────────────────────
    let _md = null;
    document.addEventListener('mousedown', e => _md = e.target);
    [['writeModal', () => closeWriteModal()], ['detailModal', () => closeDetailModal()], ['authModal', () => closeAuthModal()]].forEach(([id, fn]) => {
        document.getElementById(id).addEventListener('click', function(e) { if (e.target === this && _md === this) fn(); });
    });
    document.getElementById('confirmModal').addEventListener('click', function(e) { if (e.target === this) resolveConfirm(false); });
</script>

</body>
</html>
