<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>노우영</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            text-decoration: none;
        }

        body {
            font-family: 'Apple SD Gothic Neo', 'Pretendard', sans-serif;
            line-height: 1.6;
            color: #333;
            background-color: #f9f9fb;
        }

        header {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid #eee;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            padding: 1rem 2rem;
        }

        .logo {
            font-size: 1.2rem;
            font-weight: 800;
            letter-spacing: -1px;
            color: #333;
        }

        nav a {
            font-size: 0.9rem;
            color: #555;
            font-weight: 500;
            transition: color 0.2s;
        }

        nav a:hover {
            color: #007AFF;
        }

        main {
            padding-top: 80px;
        }

        .page-title {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            padding: 5rem 2rem 4rem;
            text-align: center;
            animation: fadeIn 0.8s ease-out;
        }

        .badge {
            background: #007AFF;
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: bold;
            display: inline-block;
            margin-bottom: 1rem;
        }

        .page-title h1 {
            font-size: 2.8rem;
            font-weight: 800;
            letter-spacing: -1px;
            line-height: 1.2;
        }

        .page-title h1 strong {
            color: #007AFF;
        }

        .page-title p {
            margin-top: 0.8rem;
            font-size: 1.1rem;
            color: #666;
        }

        section {
            max-width: 800px;
            margin: 0 auto;
            padding: 4rem 2rem;
            animation: fadeIn 0.9s ease-out;
        }

        .section-label {
            font-size: 0.75rem;
            font-weight: 700;
            color: #007AFF;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 0.5rem;
        }

        .section-title {
            font-size: 1.8rem;
            font-weight: 800;
            margin-bottom: 2rem;
            letter-spacing: -0.5px;
        }

        .divider {
            border: none;
            border-top: 1px solid #e5e5e5;
            max-width: 800px;
            margin: 0 auto;
        }

        .skills-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 1.2rem;
        }

        .skill-card {
            background: white;
            border-radius: 16px;
            padding: 1.5rem;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.06);
            transition: transform 0.25s ease, box-shadow 0.25s ease;
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .skill-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.1);
        }

        .skill-icon {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            flex-shrink: 0;
        }

        .skill-icon.html { background: #fff3ee; }
        .skill-icon.css  { background: #eef3ff; }
        .skill-icon.js   { background: #fffbe6; }

        .skill-info h3 {
            font-size: 1rem;
            font-weight: 700;
        }

        .skill-info p {
            font-size: 0.8rem;
            color: #888;
            margin-top: 2px;
        }

        .level-bar-wrap {
            margin-top: 6px;
            background: #f0f0f0;
            border-radius: 10px;
            height: 5px;
            width: 100%;
            overflow: hidden;
        }

        .level-bar {
            height: 100%;
            border-radius: 10px;
            background: #007AFF;
        }

        .back-wrap {
            text-align: center;
            padding: 2rem 0 5rem;
        }

        .btn {
            display: inline-block;
            padding: 14px 36px;
            background: #333;
            color: white;
            border-radius: 12px;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            font-size: 0.95rem;
        }

        .btn:hover {
            background: #000;
            transform: translateY(-4px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.2);
        }

        footer {
            text-align: center;
            padding: 2rem;
            font-size: 0.85rem;
            color: #aaa;
            border-top: 1px solid #eee;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to   { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <header>
        <div class="container">
            <a href="./index.html"><h1 class="logo">WOOYOUNG</h1></a>
        </div>
    </header>

    <main>

        <div class="page-title">
            <span class="badge">About Me</span>
            <h1>저는 이런 사람이에요,<br><strong>노우영</strong>입니다.</h1>
            <p>웹 개발을 공부하며 성장 중인 개발자입니다.</p>
        </div>

        <section>
            <p class="section-label">Tech Stack</p>
            <h2 class="section-title">기술 스택</h2>

            <div class="skills-grid">

                <div class="skill-card">
                    <div class="skill-icon html">🟧</div>
                    <div class="skill-info">
                        <h3>HTML</h3>
                        <p>마크업 구조 설계</p>
                        <div class="level-bar-wrap">
                            <div class="level-bar" style="width: 30%;"></div>
                        </div>
                    </div>
                </div>

                <div class="skill-card">
                    <div class="skill-icon css">🟦</div>
                    <div class="skill-info">
                        <h3>CSS</h3>
                        <p>스타일링 & 레이아웃</p>
                        <div class="level-bar-wrap">
                            <div class="level-bar" style="width: 30%;"></div>
                        </div>
                    </div>
                </div>

                <div class="skill-card">
                    <div class="skill-icon js">🟨</div>
                    <div class="skill-info">
                        <h3>JavaScript</h3>
                        <p>동적 기능 구현</p>
                        <div class="level-bar-wrap">
                            <div class="level-bar" style="width: 5%;"></div>
                        </div>
                    </div>
                </div>

            </div>
        </section>

        <hr class="divider">

        <div class="back-wrap">
            <a href="./index.html" class="btn">← 처음으로 돌아가기</a>
        </div>

    </main>

    <footer>
        <p>© 2026 Noh Wooyoung. Designed with Passion.</p>
    </footer>

</body>
</html>
