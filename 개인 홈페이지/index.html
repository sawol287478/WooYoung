<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>노우영</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            text-decoration: none;
        }

        body {
            font-family: 'Apple SD Gothic Neo', 'Pretendard', sans-serif;
            line-height: 1.6;
            color: #333;
            background-color: #f9f9fb;
        }

        /* 헤더 */
        header {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid #eee;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            padding: 1rem 2rem;
        }

        .logo {
            font-size: 1.2rem;
            font-weight: 800;
            letter-spacing: -1px;
            color: #333;
        }

        /* 히어로 섹션 */
        .hero {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            text-align: center;
        }

        .hero-content {
            animation: fadeIn 1s ease-out;
        }

        .badge {
            background: #007AFF;
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: bold;
            display: inline-block;
            margin-bottom: 1rem;
        }

        .hero h1 {
            font-size: 3.5rem;
            margin-bottom: 1rem;
            line-height: 1.2;
            font-weight: 800;
            letter-spacing: -1px;
        }

        .hero h1 strong {
            color: #007AFF;
        }

        .hero p {
            font-size: 1.2rem;
            color: #666;
        }

        .btn {
            display: inline-block;
            margin-top: 2rem;
            padding: 15px 40px;
            background: #333;
            color: white;
            border-radius: 12px;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            font-size: 0.95rem;
        }

        .btn:hover {
            background: #000;
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.2);
        }

        /* 푸터 */
        footer {
            position: fixed;
            bottom: 30px;
            width: 100%;
            text-align: center;
            font-size: 0.9rem;
            color: #888;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to   { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <header>
        <div class="container">
            <a href="./index.html"><h1 class="logo">WOOYOUNG</h1></a>
        </div>
    </header>

    <main>
        <section class="hero">
            <div class="hero-content">
                <span class="badge">Web Developer</span>
                <h1>안녕하세요, <br><strong>노우영</strong>입니다.</h1>
                <p>웹 개발 쪽에 관심을 가지고 공부하고 있습니다.</p>
                <a href="./index2.html" class="btn">더 알아보기</a>
            </div>
        </section>
    </main>

    <footer>
        <p>© 2026 Noh Wooyoung. Designed with Passion.</p>
    </footer>

</body>
</html>
